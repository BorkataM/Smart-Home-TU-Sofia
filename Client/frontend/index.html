<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Home Simulator</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main>
        <h1>Smart Home Simulator</h1>

        <section class="config">
            <label for="room-select">Room:</label>
            <select id="room-select">
                <option value="living_room">Living Room</option>
                <option value="kitchen">Kitchen</option>
                <option value="bedroom">Bedroom</option>
            </select>
        </section>

        <section class="video-container">
            <div>
                <video id="camera" autoplay playsinline muted></video>
                <canvas id="capture-canvas" width="320" height="240" hidden></canvas>
            </div>
            <div class="connection-status">
                <p>WS: <span id="ws-status">Connecting...</span></p>
                <p>Camera: <span id="camera-status">Initializing...</span></p>
                <p>Gesture: <span id="gesture-status">None</span></p>
                <p>Voice stream active.</p>
            </div>
        </section>

        <section class="room-visual" id="room-visual">
            <h2>Room Animation</h2>
            <div id="room-cards" class="room-cards"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
